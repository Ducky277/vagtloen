<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vagtløn</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0e0f11; color: #f0f2f5; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  body { padding: 2rem 1rem; }
  .wrapper { max-width: 960px; margin: 0 auto; }

  .logo {
    font-family: 'DM Mono', monospace;
    color: #c8f135;
    margin-bottom: 2rem;
  }

  .settings-bar {
    background: #16181c;
    border: 1px solid #2a2d35;
    border-radius: 12px;
    padding: 1.25rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .field {
    flex: 1;
    min-width: 120px;
  }

  label {
    font-size: 0.7rem;
    color: #7a7f8e;
  }

  input {
    width: 100%;
    background: #1e2128;
    border: 1px solid #2a2d35;
    color: white;
    padding: 0.5rem;
    border-radius: 8px;
  }

  .btn {
    background: #c8f135;
    border: none;
    padding: 0.6rem 1rem;
    cursor: pointer;
    border-radius: 8px;
  }

  .status-bar {
    margin-bottom: 1rem;
    color: #7a7f8e;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: #16181c;
    border: 1px solid #2a2d35;
    padding: 1rem;
    border-radius: 12px;
  }

  .stat-value {
    font-size: 1.4rem;
    font-family: monospace;
  }

  .teal { color: #5ce1c8; }
  .accent { color: #c8f135; }

  .shifts {
    background: #16181c;
    border-radius: 12px;
    border: 1px solid #2a2d35;
    padding: 1rem;
  }

  .row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    padding: 0.8rem;
    border-bottom: 1px solid #2a2d35;
  }
</style>
</head>

<body>
<div class="wrapper">

  <div class="logo">Vagtløn</div>

  <div class="settings-bar">
    <div class="field">
      <label>Base rate</label>
      <input id="baseRate" value="142.17">
    </div>

    <div class="field">
      <label>Tax %</label>
      <input id="taxRate" value="39">
    </div>

    <button class="btn" onclick="loadShifts()">Load</button>
  </div>

  <div class="status-bar" id="status">Not connected</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div>Shifts</div>
      <div class="stat-value" id="count">—</div>
    </div>

    <div class="stat-card">
      <div>Hours</div>
      <div class="stat-value" id="hours">—</div>
    </div>

    <div class="stat-card">
      <div>Gross</div>
      <div class="stat-value accent" id="gross">—</div>
    </div>

    <div class="stat-card">
      <div>Net</div>
      <div class="stat-value teal" id="net">—</div>
    </div>
  </div>

  <div class="shifts" id="shifts"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxgktjTN9a69CGlDBsiL0O7hparyB0_8AsdXG0hW_FNzmHjyVC9bNy-dKj77KgknWRQhA/exec";

async function loadShifts() {
  try {
    document.getElementById("status").innerText = "Loading...";

    const res = await fetch(API_URL);
    const data = await res.json();

    render(data);

    document.getElementById("status").innerText = "Connected";
  } catch (e) {
    document.getElementById("status").innerText = "Error";
  }
}

function getRates() {
  return {
    base: +baseRate.value,
    tax: +taxRate.value / 100
  };
}

function render(data) {
  const r = getRates();

  let h = 0, g = 0;
  let html = "";

  data.forEach(s => {
    const gross = s.hours * r.base;
    const net = gross * (1 - r.tax);

    h += s.hours;
    g += gross;

    html += `
      <div class="row">
        <div>${s.title}</div>
        <div>${s.hours}h</div>
        <div>${Math.round(gross)} kr</div>
        <div>${Math.round(net)} kr</div>
      </div>
    `;
  });

  document.getElementById("shifts").innerHTML = html;

  count.innerText = data.length;
  hours.innerText = h;
  gross.innerText = Math.round(g) + " kr";
  net.innerText = Math.round(g * (1 - r.tax)) + " kr";
}

loadShifts();

</script>
</body>
</html>
